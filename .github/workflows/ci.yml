name: CI

on:
  push:
  pull_request:
  workflow_dispatch:   # manually trigger from the Actions tab in GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          uv-version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff formater
        run: uv run ruff format --check

      - name: Ruff linter
        run: uv run ruff check

      - name: Run Extract
        run: uv run python extract.py

      - name: Run pytest
        run: uv run pytest

      - name: Run dbt
        run: uv run dbt run --project-dir dbt --profiles-dir dbt

      - name: Run dbt tests
        run: uv run dbt test --project-dir dbt --profiles-dir dbt
