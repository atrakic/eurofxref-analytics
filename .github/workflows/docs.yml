name: Deploy dbt docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync

      - name: Extract FX data
        run: uv run python extract.py

      - name: Run dbt models
        run: uv run dbt run --project-dir dbt --profiles-dir dbt

      - name: Generate dbt docs
        run: uv run dbt docs generate --project-dir dbt --profiles-dir dbt

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dbt/target/index.html dbt/target/manifest.json dbt/target/catalog.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
